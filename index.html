<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outlet Visit - JIA Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --teal-dark: #0a4d68; --teal-mid: #1a7fa8; --teal-light: #2196c4;
    --accent: #00d2ff; --bg: #eef2f7; --card: #ffffff;
    --text: #1a2b3c; --muted: #7a9ab5; --success: #00c48c;
    --warn: #ffb300; --danger: #ff4d4d; --orange: #ff7c2a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #c9d6df; display: flex; justify-content: center; min-height: 100vh; font-family: 'Rajdhani', 'Noto Sans Bengali', sans-serif; padding: 10px 0; }
  .phone { width: 100%; max-width: 400px; min-height: 90vh; background: var(--bg); border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.2), 0 0 0 8px #1a2b3c; overflow: hidden; display: flex; flex-direction: column; position: relative; }
  .header { background: linear-gradient(160deg, var(--teal-dark), var(--teal-light)); padding-bottom: 15px; }
  .topbar { display: flex; justify-content: space-between; padding: 15px; color: #fff; }
  .outlet-info { padding: 0 15px; color: #fff; display: flex; justify-content: space-between; }
  .outlet-name { font-weight: 700; font-size: 18px; }
  .outlet-sub { font-size: 12px; opacity: 0.8; margin-top: 3px; }
  .target-row { display: flex; gap: 10px; padding: 15px; }
  .target-box { flex: 1; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px; text-align: center; color: #fff; }
  .target-val { font-size: 18px; font-weight: 700; }
  .target-label { font-size: 10px; color: var(--accent); text-transform: uppercase; }
  .progress-wrap { padding: 0 15px; }
  .progress-bar { background: rgba(255,255,255,0.2); height: 20px; border-radius: 10px; position: relative; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--success); width: 65%; transition: 0.5s; }
  .page { display: none; flex: 1; overflow-y: auto; padding: 15px; }
  .active { display: block; }
  .section-title { font-size: 12px; font-weight: 700; color: var(--muted); margin: 15px 0 10px; text-transform: uppercase; }
  .brand-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .brand-card { background: #fff; padding: 15px 5px; border-radius: 15px; text-align: center; cursor: pointer; border: 1px solid #ddd; }
  .brand-emoji { font-size: 24px; }
  .brand-name { font-size: 11px; font-weight: 600; margin-top: 5px; }
  .sku-card { background: #fff; padding: 10px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; border: 1px solid #eee; }
  .sku-img { width: 40px; height: 40px; background: #f0f0f0; border-radius: 5px; display: flex; align-items: center; justify-content: center; }
  .bottom-nav { background: var(--teal-dark); display: flex; padding: 10px; }
  .nav-btn { flex: 1; color: #fff; background: none; border: none; font-size: 11px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>
<div class="phone">
  <div class="header">
    <div class="topbar"><span>&#8592;</span> <b>JIA COLLECTION</b> <span>&#9776;</span></div>
    <div class="outlet-info">
      <div><div class="outlet-name">নাসির আউটলেট (Demo)</div><div class="outlet-sub">ফোন: ০১৭XXXXXXXX</div></div>
    </div>
    <div class="target-row">
      <div class="target-box"><div class="target-val">৫০০০.০</div><div class="target-label">Target</div></div>
      <div class="target-box"><div class="target-val">১৭৫০.০</div><div class="target-label">Remaining</div></div>
    </div>
    <div class="progress-wrap"><div class="progress-bar"><div class="progress-fill"></div></div></div>
  </div>
  <div id="pageMain" class="page active">
    <div class="section-title">Brands</div>
    <div class="brand-grid" id="brandGrid"></div>
  </div>
  <div id="pageSku" class="page">
    <div onclick="showPage('pageMain')" style="color:var(--teal-dark); cursor:pointer; margin-bottom:10px;">&#8592; Back</div>
    <div id="skuTitle" class="section-title">SKU List</div>
    <div id="skuGrid"></div>
  </div>
  <div class="bottom-nav"><button class="nav-btn">STOCK</button><button class="nav-btn">ORDER</button><button class="nav-btn">EXIT</button></div>
</div>
<script>
  const brands = [
    {name: "Seylon Tea", emoji: "🍵"}, {name: "Oil", emoji: "🧴"}, {name: "Rice", emoji: "🌾"},
    {name: "Sugar", emoji: "🍬"}, {name: "Drinks", emoji: "🥤"}, {name: "Snacks", emoji: "🥨"}
  ];
  const skus = {
    "Seylon Tea": ["সিলন চা ৫০০ গ্রাম", "সিলন চা ২০০ গ্রাম"],
    "Oil": ["রূপচাঁদা ৫ লিটার", "পুষ্টি ১ লিটার"],
    "Rice": ["নাজিরশাইল ৫ কেজি", "মিনিকেট ১০ কেজি"]
  };
  function renderBrands() {
    const grid = document.getElementById('brandGrid');
    brands.forEach(b => {
      const div = document.createElement('div');
      div.className = 'brand-card';
      div.innerHTML = `<div class="brand-emoji">${b.emoji}</div><div class="brand-name">${b.name}</div>`;
      div.onclick = () => openSku(b.name);
      grid.appendChild(div);
    });
  }
  function openSku(name) {
    const grid = document.getElementById('skuGrid');
    document.getElementById('skuTitle').innerText = name + " - SKU";
    grid.innerHTML = "";
    (skus[name] || ["পণ্য পাওয়া যায়নি"]).forEach(item => {
      grid.innerHTML += `<div class="sku-card"><div class="sku-img">📦</div><div><b>${item}</b><br><small>Stock: 10</small></div></div>`;
    });
    showPage('pageSku');
  }
  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
  renderBrands();
</script>
</body>
</html>
